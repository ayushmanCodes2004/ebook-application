spring:
  cloud:
    gateway:
      server:
        webflux:
          discovery:
            locator:
              lower-case-service-id: true
              enabled: true
          routes:
            - id: book-service-route
#              uri: lb://book-service
#              uri: http://localhost:6000
              uri: lb://book-service
              predicates:
                - Path=/api/v1/books/**, /api/v1/genres/**
              filters:
                - RewritePath=/api/v1/(?<segment>.*), /${segment}
                - CustomAuthFilter
#                - name: RequestRateLimiter
#                  args:
#                    key-Resolver: "#{@ipKeyResolver}"
#                    redis-rate-limiter.replenishRate: 2
#                    redis-rate-limiter.burstCapacity: 2




            - id: order-service-route
#              uri: http://localhost:6001
              uri: lb://orders-service
              predicates:
                - Path=/api/v1/orders/**
              filters:
                - RewritePath=/api/v1/(?<segment>.*), /${segment}
                - CustomAuthFilter




            - id: payment-service-route
#              uri: http://localhost:6002
              uri: lb://payment-service
              predicates:
                - Path=/api/v1/payments/**
              filters:
                - RewritePath=/api/v1/(?<segment>.*), /${segment}
                - CustomAuthFilter





            - id: auth-service-route
#              uri: http://localhost:6003
              uri: lb://auth-service
              predicates:
                  - Path=/api/v1/auth/**
              filters:
                  - RewritePath=/api/v1/(?<segment>.*), /${segment}


eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/



  instance:
    prefer-ip-address: true   # IP use karega instead of hostname
    ip-address: 127.0.0.1      # force localhost

